name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Check Rust code formatting
  rustfmt:
    name: Rustfmt Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - name: Run rustfmt
        run: cargo fmt --all -- --check

  # Run clippy lints
  clippy:
    name: Clippy Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libbpf-dev \
            libelf-dev \
            zlib1g-dev \
            make
      
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings

  # Build Rust code
  build-rust:
    name: Build Rust Code
    runs-on: ubuntu-latest
    needs: [rustfmt, clippy]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libbpf-dev \
            libelf-dev \
            zlib1g-dev \
            make
      
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build daemon
        run: cargo build -p goodbyedpi-daemon --release
      
      - name: Build CLI
        run: cargo build -p goodbyedpi --release
      
      - name: Build proto library
        run: cargo build -p goodbyedpi-proto --release

  # Compile eBPF object
  build-ebpf:
    name: Build eBPF Object
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libbpf-dev \
            libelf-dev \
            zlib1g-dev \
            make \
            linux-headers-generic \
            bpftool
      
      - name: Check bpftool availability
        run: |
          resolve_bpftool() {
            for candidate in bpftool /usr/sbin/bpftool /usr/bin/bpftool /usr/local/sbin/bpftool /sbin/bpftool; do
              if command -v "$candidate" >/dev/null 2>&1; then
                path="$(command -v "$candidate")"
              elif [ -x "$candidate" ]; then
                path="$candidate"
              else
                continue
              fi

              if "$path" --version >/dev/null 2>&1; then
                echo "$path"
                return 0
              fi
            done

            return 1
          }

          if ! BPFTOOL="$(resolve_bpftool)"; then
            echo "::error::working bpftool not found"
            exit 1
          fi

          echo "bpftool found: $BPFTOOL"
          "$BPFTOOL" --version
          echo "BPFTOOL=$BPFTOOL" >> "$GITHUB_ENV"
      
      - name: Compile eBPF code
        run: |
          cd ebpf/src
          make clean
          make all BPFTOOL="$BPFTOOL"
      
      - name: Upload eBPF object
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-object
          path: ebpf/src/goodbyedpi.bpf.o
          if-no-files-found: error

  # Run Rust tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build-rust
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libbpf-dev \
            libelf-dev \
            zlib1g-dev \
            make
      
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run tests
        run: cargo test --all -- --nocapture

  # Check documentation
  doc:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libbpf-dev \
            libelf-dev \
            zlib1g-dev \
            make
      
      - name: Check documentation
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  # Security audit
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-audit
        run: cargo install cargo-audit
      
      - name: Run audit
        run: cargo audit
